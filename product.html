<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>shopAI — Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{colors:{terracotta:'#c1604a'},fontFamily:{sans:['DM Sans','sans-serif'],display:['Playfair Display','serif']}}}}
</script>
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skeleton{background:linear-gradient(90deg,#f1f0ee 25%,#e8e6e1 50%,#f1f0ee 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body class="bg-stone-50 font-sans text-stone-900 min-h-screen">

<div id="nav-placeholder"></div>

<div id="product-content" class="max-w-7xl mx-auto px-4 sm:px-6 py-10"></div>

<script src="script.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML=renderNav('home');

const raw=sessionStorage.getItem('shopai_product');
const uid=localStorage.getItem('shopai_uid')||'';

if(!raw){
  document.getElementById('product-content').innerHTML=`
  <div class="text-center py-24">
    <div class="text-5xl mb-4">📦</div>
    <h2 class="text-xl font-semibold mb-2">No product selected</h2>
    <p class="text-stone-400 mb-6 text-sm">Go back to the home page and click on a product.</p>
    <a href="index.html" class="px-5 py-2.5 bg-stone-900 text-white rounded-xl text-sm font-semibold hover:bg-terracotta transition-colors">← Back to Home</a>
  </div>`;
}else{
  const p=JSON.parse(raw);
  const {key,label}=categorise(p.description||'');
  const conf=confidence(p.score||0);
  const pct=Math.round((p.score||0)*100);
  const price=p.price||mockPrice(key,p.item_id||'x');
  const emoji=p.emoji||seedIcon(p.item_id,key);

  const thumbBg={
    home:'bg-stone-100',decor:'bg-purple-50',gift:'bg-rose-50',
    kitchen:'bg-amber-50',garden:'bg-green-50',fashion:'bg-pink-50',other:'bg-slate-100'
  }[key]||'bg-slate-100';

  document.title=`shopAI — ${p.description||'Product'}`;

  document.getElementById('product-content').innerHTML=`
  <!-- BREADCRUMB -->
  <nav class="text-xs text-stone-400 mb-6 flex items-center gap-1.5">
    <a href="index.html" class="hover:text-terracotta transition-colors">Home</a>
    <span>/</span>
    <span>${label}</span>
    <span>/</span>
    <span class="text-stone-600 font-medium truncate max-w-xs">${esc(p.description||'')}</span>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="grid md:grid-cols-2 gap-10 mb-16">
    <!-- IMAGE PANEL -->
    <div>
      <div class="${thumbBg} rounded-3xl h-80 flex items-center justify-center text-8xl shadow-inner relative">
        ${emoji}
        <span class="absolute top-4 right-4 text-xs font-semibold px-3 py-1 rounded-full border ${conf.color}">${conf.label}</span>
      </div>
      <div class="flex gap-3 mt-4">
        ${[emoji,emoji,emoji].map((e,i)=>`
        <button class="w-20 h-20 rounded-xl ${thumbBg} flex items-center justify-center text-3xl border-2 ${i===0?'border-terracotta':'border-transparent'} hover:border-terracotta transition-colors">
          ${e}
        </button>`).join('')}
      </div>
    </div>

    <!-- INFO PANEL -->
    <div class="flex flex-col justify-between">
      <div>
        <span class="text-xs uppercase tracking-widest text-stone-400 font-semibold">${label}</span>
        <h1 class="font-display text-3xl text-stone-900 mt-2 mb-1 leading-tight">${esc(p.description||'Unknown Product')}</h1>
        <p class="text-xs text-stone-400 font-mono mb-6">SKU: ${esc(String(p.item_id||''))}</p>

        <div class="flex items-end gap-4 mb-6">
          <span class="text-4xl font-bold text-terracotta">£${price}</span>
          <span class="text-sm text-stone-400 line-through">£${(parseFloat(price)*1.2).toFixed(2)}</span>
          <span class="text-xs bg-green-50 text-green-700 border border-green-200 rounded-full px-2 py-0.5 font-medium">Save 17%</span>
        </div>

        <!-- MATCH SCORE -->
        <div class="bg-stone-100 rounded-2xl p-4 mb-6">
          <div class="flex justify-between text-sm font-medium mb-2">
            <span class="text-stone-600">AI Match Score</span>
            <span class="text-terracotta font-bold">${pct}%</span>
          </div>
          <div class="w-full bg-stone-200 rounded-full h-2 mb-3">
            <div class="bg-terracotta h-2 rounded-full" style="width:${pct}%"></div>
          </div>
          <div class="flex flex-wrap gap-2">
            <span class="text-xs bg-white border border-stone-200 rounded-full px-3 py-1 text-stone-500">✦ Popular among similar users</span>
            <span class="text-xs bg-white border border-stone-200 rounded-full px-3 py-1 text-stone-500">✦ Frequently purchased together</span>
          </div>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold text-stone-700 mb-2">About this product</h3>
          <p class="text-sm text-stone-500 leading-relaxed">
            A carefully curated ${label.toLowerCase()} item from our recommended collection.
            Based on your purchase history, this product has a strong affinity match
            with items you've previously bought or browsed.
          </p>
        </div>

        <!-- FEATURES -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          ${[['🚚','Free delivery','On orders over £30'],['↩️','Easy returns','30-day return policy'],['✅','In stock','Ready to ship'],['⭐','Top rated','High demand product']].map(([icon,title,sub])=>`
          <div class="flex items-start gap-2 p-3 bg-white border border-stone-200 rounded-xl">
            <span class="text-lg">${icon}</span>
            <div>
              <p class="text-xs font-semibold text-stone-700">${title}</p>
              <p class="text-xs text-stone-400">${sub}</p>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="flex gap-3">
        <button onclick="addToCart('${esc(String(p.item_id))}','${esc(p.description||'')}','${price}')"
          class="flex-1 py-3.5 bg-stone-900 text-white rounded-2xl font-semibold text-sm hover:bg-terracotta transition-colors">
          Add to Cart
        </button>
        <button class="px-4 py-3.5 border-2 border-stone-200 rounded-2xl text-stone-500 hover:border-terracotta hover:text-terracotta transition-colors text-lg">
          ♡
        </button>
      </div>
    </div>
  </div>

  <!-- SIMILAR PRODUCTS -->
  <div>
    <div class="flex items-center justify-between mb-6">
      <h2 class="font-display text-2xl">Similar Products</h2>
      <span class="text-xs text-stone-400">Powered by recommendation engine</span>
    </div>
    <div id="similar-loading" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
      ${Array(5).fill(0).map(()=>`
      <div class="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div class="h-28 skeleton"></div>
        <div class="p-3 space-y-2"><div class="h-3 rounded skeleton w-1/3"></div><div class="h-4 rounded skeleton"></div><div class="h-7 rounded-xl skeleton mt-3"></div></div>
      </div>`).join('')}
    </div>
    <div id="similar-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4" style="display:none"></div>
    <div id="similar-error" class="text-sm text-stone-400 text-center py-6" style="display:none">
      Could not load similar products — Flask API may be offline.
    </div>
  </div>
  `;

  // Load similar products
  loadSimilar(uid,p.item_id);
}

async function loadSimilar(uid,currentId){
  try{
    const fallbackUid=uid||'12747';
    const r=await fetch(`${API}/recommend/${fallbackUid}?n=10`);
    const d=await r.json();
    const recs=(d.recommendations||[]).filter(x=>String(x.item_id)!==String(currentId)).slice(0,5);

    document.getElementById('similar-loading').style.display='none';

    if(!recs.length){
      document.getElementById('similar-error').style.display='block';
      return;
    }

    document.getElementById('similar-grid').innerHTML=recs.map((r,i)=>productCard(r,i,true)).join('');
    document.getElementById('similar-grid').style.display='grid';
  }catch(e){
    document.getElementById('similar-loading').style.display='none';
    document.getElementById('similar-error').style.display='block';
  }
}
</script>
</body>
</html>
